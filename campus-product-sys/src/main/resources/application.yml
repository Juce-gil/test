server:
  port: 21090
  servlet:
    context-path: /api/campus-product-sys/v1.0

my-server:
  api-context-path: /api/campus-product-sys/v1.0

spring:
  application:
    name: campus-trade-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000

mybatis:
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: campus-trade-demo-secret
  expire-hours: 72

trade:
  upload-dir: ./pic
  frontend-user-base-url: http://localhost:5173
  frontend-admin-base-url: http://localhost:5174
  websocket-path: /ws/chat

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: campus-trade
