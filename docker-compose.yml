version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: campus-trade-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: campus_trade
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.2-alpine
    container_name: campus-trade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: campus-trade-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/minio/data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: campus-trade-nginx
    restart: unless-stopped
    depends_on:
      - minio
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend-user/dist:/usr/share/nginx/html/user:ro
      - ./frontend-admin/dist:/usr/share/nginx/html/admin:ro
